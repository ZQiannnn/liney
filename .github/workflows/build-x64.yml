name: Build macOS x64

on:
  workflow_dispatch:
    inputs:
      create_dmg:
        description: "Create DMG (1/0)"
        required: false
        default: "0"

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26 (Swift 6.2 needed for default actor isolation)
        run: |
          set -euo pipefail
          ls /Applications/ | grep -i Xcode || true
          # Liney uses SE-0466 (default actor isolation), which requires Swift 6.2 / Xcode 26+
          XCODE_APP=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          [[ -z "$XCODE_APP" ]] && { echo "No Xcode 26 found"; exit 1; }
          echo "Using $XCODE_APP"
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"
          xcodebuild -version
          swift --version

      - name: Download Metal toolchain
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Verify vendored GhosttyKit has x86_64 slice
        run: |
          set -euo pipefail
          LIB=Liney/Vendor/GhosttyKit.xcframework/macos-arm64_x86_64/libghostty.a
          lipo -info "$LIB"
          lipo -info "$LIB" | grep -q "x86_64" || { echo "No x86_64 slice in GhosttyKit"; exit 1; }

      - name: Build Liney for x86_64 only
        env:
          RELEASE_ARCHS: "x86_64"
          CREATE_DMG: ${{ inputs.create_dmg }}
        run: bash scripts/build_macos_app.sh

      - name: Verify .app arch
        run: |
          set -euo pipefail
          file dist/Liney.app/Contents/MacOS/Liney
          lipo -info dist/Liney.app/Contents/MacOS/Liney
          lipo -info dist/Liney.app/Contents/MacOS/Liney | grep -q "x86_64" || exit 1

      - name: Strip code signature (cross-compiled binary)
        run: |
          set -euo pipefail
          /usr/bin/codesign --remove-signature dist/Liney.app 2>/dev/null || true
          /usr/bin/codesign --force --deep --sign - dist/Liney.app 2>&1 | tail -5 || true

      - name: Zip the .app
        run: |
          set -euo pipefail
          cd dist
          ditto -c -k --norsrc --keepParent Liney.app Liney-x86_64.zip
          ls -lh Liney-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Liney-macos-x86_64
          path: |
            dist/Liney-x86_64.zip
            dist/Liney-*.dmg
          retention-days: 14
          if-no-files-found: warn
