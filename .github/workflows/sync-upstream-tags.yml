name: Sync upstream tags

on:
  schedule:
    # 每天 UTC 03:00 (北京 11:00) 检查一次
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (only report, do not push)"
        required: false
        default: "0"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      UPSTREAM: https://github.com/everettjf/liney.git
      OUR_BRANCH: main

    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Optional PAT (repo + workflow scopes) for pushing tags whose commits
          # touch .github/workflows/*. Falls back to GITHUB_TOKEN.
          token: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream + fetch tags
        run: |
          set -euo pipefail
          git remote add upstream "$UPSTREAM" || git remote set-url upstream "$UPSTREAM"
          git fetch upstream --tags --prune --no-recurse-submodules
          echo "Upstream tags:"; git tag -l 'v*' --contains upstream/main 2>/dev/null | tail -n 20 || true

      - name: Compute new upstream tags
        id: diff
        run: |
          set +e  # grep returns 1 when no match; tolerate that
          UP_RAW=$(git ls-remote --tags upstream 2>/dev/null | awk '{print $2}' | sed 's|refs/tags/||')
          OUR_RAW=$(git ls-remote --tags origin   2>/dev/null | awk '{print $2}' | sed 's|refs/tags/||')
          UP_TAGS=$(echo "$UP_RAW"  | grep -vE '\^\{\}$' | grep -E '^v[0-9]' | sort -V)
          OUR_TAGS=$(echo "$OUR_RAW" | grep -vE '\^\{\}$' | grep -E '^v[0-9]' | sort -V)
          set -eo pipefail
          UP_COUNT=0; OUR_COUNT=0
          [[ -n "$UP_TAGS"  ]] && UP_COUNT=$(echo  "$UP_TAGS"  | wc -l | tr -d ' ')
          [[ -n "$OUR_TAGS" ]] && OUR_COUNT=$(echo "$OUR_TAGS" | wc -l | tr -d ' ')
          echo "Upstream has $UP_COUNT v-tags"
          echo "Fork has $OUR_COUNT v-tags"
          NEW=$(comm -23 <(echo "$UP_TAGS" | sort) <(echo "$OUR_TAGS" | sort) | sort -V)
          if [[ -z "$NEW" ]]; then
            echo "No new upstream tags. Exiting."
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "New tags to sync:"
          printf '  %s\n' $NEW
          echo "has_new=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' $NEW > /tmp/new_tags.txt

      - name: Sync each upstream tag (tag-only for ancestors, merge for new)
        if: steps.diff.outputs.has_new == 'true'
        run: |
          set -euo pipefail
          git checkout "$OUR_BRANCH"
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            target=$(git rev-list -n 1 "refs/tags/$tag" 2>/dev/null || echo "")
            if [[ -z "$target" ]]; then
              echo "⚠️  Skipping $tag — cannot resolve target commit"
              continue
            fi
            if git merge-base --is-ancestor "$target" HEAD; then
              # Tag's commit already in our history → just label it (no merge)
              echo "=== Tagging $tag (ancestor: $(git rev-parse --short $target)) ==="
              git tag -af "$tag" -m "sync: $tag from upstream" "$target"
            else
              echo "=== Merging $tag ==="
              if ! git merge --no-ff "refs/tags/$tag" -m "sync: merge upstream $tag" --no-edit; then
                echo "::error title=Merge conflict::Cannot auto-merge upstream tag $tag. Resolve manually."
                git merge --abort || true
                exit 1
              fi
              git tag -af "$tag" -m "sync: $tag from upstream"
            fi
          done < /tmp/new_tags.txt

      - name: Push (unless dry run)
        if: steps.diff.outputs.has_new == 'true' && inputs.dry_run != '1'
        run: |
          set -u
          git push origin "$OUR_BRANCH" || true
          # Push tags individually so a workflow-permission rejection on one
          # tag doesn't block the rest. (GITHUB_TOKEN cannot push commits
          # that touch .github/workflows/* without a PAT with `workflow` scope.)
          FAILED=()
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            if git push origin "refs/tags/$tag" 2>&1 | tee /tmp/push.log; then
              echo "  pushed $tag"
            else
              if grep -q "without .workflows. permission" /tmp/push.log; then
                echo "  ⏭  skipped $tag (workflow file in commit — needs PAT with workflow scope)"
              else
                echo "  ❌ failed $tag"
              fi
              FAILED+=("$tag")
            fi
          done < /tmp/new_tags.txt
          if [[ ${#FAILED[@]} -gt 0 ]]; then
            echo "::warning::Some tags could not be pushed by GITHUB_TOKEN: ${FAILED[*]}"
            echo "To push these, set a SYNC_PAT secret with 'repo + workflow' scopes."
          fi

      - name: Summary
        if: always()
        run: |
          if [[ -f /tmp/new_tags.txt ]]; then
            echo "### Synced tags" >> "$GITHUB_STEP_SUMMARY"
            while IFS= read -r tag; do
              [[ -n "$tag" ]] && echo "- \`$tag\`" >> "$GITHUB_STEP_SUMMARY"
            done < /tmp/new_tags.txt
          else
            echo "### No new upstream tags" >> "$GITHUB_STEP_SUMMARY"
          fi
